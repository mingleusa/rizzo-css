# Cross-browser accessibility tests (axe, keyboard, ARIA).
# Runs on Chromium, Firefox, and WebKit. See docs/BROWSER_SUPPORT.md and docs/ACCESSIBILITY.md.
name: Accessibility (a11y)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bundle size budget
        run: node scripts/bundle-size.mjs --check

      - name: Install Playwright browsers (Chromium, Firefox, WebKit)
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run a11y tests (Chromium, Firefox, WebKit)
        run: pnpm exec playwright test tests/a11y --project=a11y --project=a11y-firefox --project=a11y-webkit

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
