# Cross-browser accessibility tests (axe, keyboard, ARIA).
# Build once, then run Chromium and Firefox with 2 shards each plus WebKit (5 jobs total). Sharding speeds up axe; 6 workers per job. See docs/TESTING.md and docs/BROWSER_SUPPORT.md.
name: Accessibility (a11y)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Build
        run: pnpm build

      - name: Bundle size budget
        run: node scripts/bundle-size.mjs --check

      - name: Verify build output
        run: |
          if [ ! -d dist ] || [ ! -f dist/index.html ]; then
            echo "::error::Build did not produce dist/ or dist/index.html"
            exit 1
          fi
          echo "Build output OK"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: a11y-dist
          path: dist/

  a11y-browser:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: a11y
            shard: 1
            shard_total: 2
          - project: a11y
            shard: 2
            shard_total: 2
          - project: a11y-firefox
            shard: 1
            shard_total: 2
          - project: a11y-firefox
            shard: 2
            shard_total: 2
          - project: a11y-webkit
            shard: 0
            shard_total: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: a11y-dist
          path: dist

      - name: Verify dist after download
        run: |
          if [ ! -d dist ] || [ ! -f dist/index.html ]; then
            echo "::error::Downloaded artifact missing dist/ or dist/index.html"
            ls -la dist 2>/dev/null || true
            exit 1
          fi
          echo "Dist OK ($(find dist -type f | wc -l) files)"

      - name: Install Playwright browser
        run: |
          case "${{ matrix.project }}" in
            a11y)           pnpm exec playwright install --with-deps chromium ;;
            a11y-firefox)   pnpm exec playwright install --with-deps firefox ;;
            a11y-webkit)   pnpm exec playwright install --with-deps webkit ;;
          esac

      - name: Run a11y tests
        env:
          CI: true
        run: |
          if [ "${{ matrix.shard_total }}" = "1" ]; then
            pnpm exec playwright test tests/a11y --project=${{ matrix.project }}
          else
            pnpm exec playwright test tests/a11y --project=${{ matrix.project }} --shard=${{ matrix.shard }}/${{ matrix.shard_total }}
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  visual:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: a11y-dist
          path: dist

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run visual regression tests
        env:
          CI: true
        run: pnpm exec playwright test --project=visual
